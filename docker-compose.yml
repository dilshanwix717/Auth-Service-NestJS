# ==============================================================================
# Docker Compose — Auth Service
# ==============================================================================
# PostgreSQL is auth-specific so it runs here.
# Redis and RabbitMQ are already provided by the api-gateway stack —
# this service joins that network instead of spinning up duplicates.
#
# Prerequisites: api-gateway stack must be running first.
#
# Usage:
#   docker-compose up -d
#   docker-compose down
#   docker-compose down -v   # also removes postgres volume
# ==============================================================================

services:
  # ---------- Auth Service ----------
  # auth-service:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: auth-service
  #   ports:
  #     - '3001:3001'
  #   environment:
  #     - NODE_ENV=development
  #     - PORT=3001
  #     - DB_HOST=auth-service-postgres
  #     - DB_PORT=5432
  #     - DB_USERNAME=postgres
  #     - DB_PASSWORD=postgres_dev_password
  #     - DB_NAME=auth_db
  #     - REDIS_URL=redis://redis:6379        # 'redis' = container name in api-gateway network
  #     - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672  # same
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - auth-net
  #     - api-gateway_gateway-net            # join api-gateway's network to reach Redis + RabbitMQ

  # ---------- PostgreSQL ----------
  # Auth-specific — stores credentials, refresh tokens, roles, audit logs

  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
    ports:
      - '5432:5432'
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - shared-net

volumes:
  auth_db_data:
    driver: local

networks:
  shared-net:
    external: true