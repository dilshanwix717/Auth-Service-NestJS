# ==============================================================================
# Docker Compose — Local Development Environment
# ==============================================================================
# Starts PostgreSQL, Redis, and RabbitMQ for local development.
# The auth-service itself runs on the host (npm run start:dev) and connects
# to these containers via localhost.
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose down           # Stop all services
#   docker-compose down -v        # Stop and remove volumes (reset data)
#   docker-compose logs -f redis  # Follow logs for a specific service
# ==============================================================================

version: '3.8'

services:
  # ---------- PostgreSQL ----------
  # Primary data store for user credentials, refresh tokens, roles, audit logs
  postgres:
    image: postgres:16-alpine
    container_name: auth-service-postgres
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- Redis ----------
  # Used for JWT token blacklisting (JTI-based) and session caching
  # TTL-based keys auto-expire when tokens would have expired
  redis:
    image: redis:7-alpine
    container_name: auth-service-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- RabbitMQ ----------
  # Message broker for publishing auth domain events
  # Management UI available at http://localhost:15672 (guest/guest)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: auth-service-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - '5672:5672'    # AMQP protocol
      - '15672:15672'  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_running']
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
